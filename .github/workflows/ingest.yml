name: Daily Good News Discovery

on:
  workflow_dispatch:
  schedule:
    - cron: "20 23 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
      DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      AI_MAX_TOKENS: ${{ vars.AI_MAX_TOKENS }}
      PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
      PUBLIC_GITHUB_ISSUE_URL: ${{ vars.PUBLIC_GITHUB_ISSUE_URL }}
      ALLOW_AUTOPUBLISH: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve ingest date
        id: ingest-date
        run: echo "date=$(TZ=Asia/Shanghai date +%F)" >> "$GITHUB_OUTPUT"

      - name: Run daily trial
        env:
          AI_REQUEST_TIMEOUT_MS: 20000
          AI_SCORE_CONCURRENCY: 4
        run: pnpm trial:daily -- --date "${{ steps.ingest-date.outputs.date }}" --skip-publish-ai-draft

      - name: Verify build
        run: pnpm build

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/good-news-discovery
          delete-branch: true
          title: "chore: collect daily good news candidates"
          commit-message: "chore: collect daily good news candidates"
          add-paths: |
            data/candidates/**
            data/manual/**
            data/rejected/**
            data/trials/**
          body: |
            This PR was created by the scheduled ingestion workflow.

            It runs the daily discovery flow and writes candidate, rejected,
            manual draft, China-lead, and review-note artifacts only.

            It does not publish reader-submitted GitHub Issues automatically.
            It also does not update the public homepage/RSS data; weekly
            publishing is handled by the weekly review workflow.

            Review `data/candidates/`, `data/manual/`, `data/rejected/`, and
            `data/trials/` before merging.
          labels: |
            automation
            needs-review
