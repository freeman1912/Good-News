name: Ingest Good News

on:
  workflow_dispatch:
  schedule:
    - cron: "20 23 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
      DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      AI_MAX_TOKENS: ${{ vars.AI_MAX_TOKENS }}
      PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
      PUBLIC_GITHUB_ISSUE_URL: ${{ vars.PUBLIC_GITHUB_ISSUE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch feed candidates
        run: pnpm ingest:fetch

      - name: Score candidates
        run: pnpm ingest:score

      - name: Route candidates
        run: pnpm ingest:publish

      - name: Verify build
        run: pnpm build

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/good-news-ingest
          delete-branch: true
          title: "chore: ingest good news candidates"
          commit-message: "chore: ingest good news candidates"
          body: |
            This PR was created by the scheduled ingestion workflow.

            It does not publish reader-submitted GitHub Issues automatically.
            Review `data/candidates/` and `data/rejected/` before merging.
          labels: |
            automation
            needs-review
