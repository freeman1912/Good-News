- id: china-development-brief-cn
  name: 中国发展简报 / NGO信息中心
  language: zh
  regionFocus: china
  type: site
  url: https://www.chinadevelopmentbrief.org.cn/
  crawlUrls:
    - https://www.chinadevelopmentbrief.org.cn/
  crawlIncludeUrlPatterns:
    - chinadevelopmentbrief\.org\.cn/news/detail/
  crawlExcludeUrlPatterns:
    - /category/
    - /tag/
    - /author/
  crawlTitleKeywords:
    - 公益
    - 社区
    - 志愿
    - 救助
    - 乡村
    - 教育
    - 儿童
    - 环境
  crawlMaxLinks: 8
  topics:
    - charity-mutual-aid
    - public-improvement
    - education-culture
  trustLevel: medium
  officialRisk: false
  notes: Domestic nonprofit and NGO-sector discovery source. No verified RSS feed; use manually and verify project claims before publication.

