# Starter source pool for Good News.
# This list is intentionally conservative. Sources can be paused, downgraded,
# or expanded after the ingestion pipeline proves stable.

- id: good-news-network
  name: Good News Network
  language: en
  regionFocus: world
  type: rss
  url: https://www.goodnewsnetwork.org/
  rssUrl: https://www.goodnewsnetwork.org/feed/
  topics:
    - public-improvement
    - people-kindness
    - environment-animals
    - science-health
  trustLevel: high
  officialRisk: false
  notes: Long-running good-news publication. Good first source, but still verify original links when claims are specific.

